<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Leap Year Checker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 400px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        h2 { text-align: center; color: #003366; }
        form { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; }
        input[type="text"] { padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="submit"] { padding: 10px; background-color: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; }
        input[type="submit"]:hover { background-color: #005599; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Leap Year Checker</h2>
        <form action="LeapYearServlet" method="post">
            <label for="year">Enter a Year:</label>
            <input type="text" id="year" name="year" placeholder="e.g. 2024" required>
            <input type="submit" value="Check Leap Year">
        </form>
    </div>
</body>
</html>
